[package]
name = "randygpt"
version = "0.9.2"
edition = "2021"
default-run = "randygpt"

[features]
# Model size presets — select with: cargo build --release --features model-s
# Default (no feature) = model-l: 256-dim, 8-head, 6-layer, ~4.82M params
# Reference src/config.rs
model-xs = []
model-s  = []
model-ds  = []
model-m  = []
model-deep = []
model-xl = []
model-l = []

[dependencies]
[target.'cfg(not(target_os = "macos"))'.dependencies]
candle-core = { version = "0.9.2" }
candle-nn = "0.9.2"
ctrlc = "3.4"
lazy_static = "1.5.0"
rand = "0.8.0"
rayon = "1.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tiny_http = "0.12"

# Metal GPU acceleration on macOS only
[target.'cfg(target_os = "macos")'.dependencies]
candle-core = { version = "0.9.2", features = ["metal"] }

[target.'cfg(not(target_os = "macos"))'.dependencies]
candle-core = { version = "0.9.2" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
