name: Rust

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest]
        feature: [model-xs, model-ds, model.m, model-deep, model-xl, model-l]

    steps:
    - uses: actions/checkout@v4
    - name: Build/Test
      run: cargo build --verbose && cargo test
      continue-on-error: true
    - name: Build/Test
      run: cargo build --features ${{ matrix.feature }} --verbose && cargo test --features ${{ matrix.feature }} --verbose
      continue-on-error: true
