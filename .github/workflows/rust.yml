name: Rust

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest]
        feature: ["default", "model-xs", "model-s", "model-ds", "model-m", "model-deep", "model-xl", "model-l"]

    steps:
    - uses: actions/checkout@v4
    - name: Install build dependencies for Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      continue-on-error: true
    - name: Build/Test ${{ matrix.feature }}
      run: |
        if [[ "${{ matrix.feature }}" == "default" ]]; then
          cargo build --verbose && cargo test
        else
          cargo build --features ${{ matrix.feature }} --verbose && cargo test --features ${{ matrix.feature }}
        fi
      #continue-on-error: true
