name: macos-matrix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "ma*" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest]
        feature: ["default", "model-xs", "model-s", "model-ds", "model-m", "model-deep", "model-xl", "model-l", "test-config-override", "test-training-params", "test-generation-params"]

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.feature }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-${{ matrix.feature }}-cargo-
    - name: Build ${{ matrix.feature }}
      run: cargo build --verbose
    - name: Test ${{ matrix.feature }}
      run: |
        if [[ "${{ matrix.feature }}" == "default" ]]; then
          cargo test --verbose
        elif [[ "${{ matrix.feature }}" == "test-config-override" ]]; then
          echo "[model]" > RandyGPT_temp.toml
          echo "n_embd = 100" >> RandyGPT_temp.toml
          cargo run -- --config RandyGPT_temp.toml --model-s | grep "Model: S (~1.6M) — 8 layers, 4 heads, 128-dim"
        elif [[ "${{ matrix.feature }}" == "test-training-params" ]]; then
          echo "hello world" > train_temp.txt
          cargo run -- --iters 1 --train-file train_temp.txt --vocab vocab_temp.json --bpe 100 --checkpoint checkpoint_temp
        elif [[ "${{ matrix.feature }}" == "test-generation-params" ]]; then
          # Requires a checkpoint, so we'll quickly train a tiny one first
          echo "hello world" > train_gen_temp.txt
          cargo run -- --iters 1 --train-file train_gen_temp.txt --vocab vocab_gen_temp.json --bpe 100 --checkpoint checkpoint_gen_temp
          cargo run -- --generate "hello" --max-tokens 5 --resume checkpoint_gen_temp --bpe 100
        else
          cargo test --verbose -- --${{ matrix.feature }}
        fi
      #continue-on-error: true
