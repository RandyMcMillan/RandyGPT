name: macos-matrix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "ma*" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest]
        feature: ["default", "model-xs", "model-s", "model-ds", "model-m", "model-deep", "model-xl", "model-l"]

    steps:
    - uses: actions/checkout@v4
    - name: Build/Test ${{ matrix.feature }}
      run: |
        if [[ "${{ matrix.feature }}" == "default" ]]; then
          cargo build --verbose && cargo test
        else
          cargo build --features ${{ matrix.feature }} --verbose && cargo test --features ${{ matrix.feature }}
        fi
      continue-on-error: true

  build-linux:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
        feature: ["default", "model-xs", "model-s", "model-ds", "model-m", "model-deep", "model-xl", "model-l"]
        target: [x86_64-unknown-linux-gnu]

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust target and LLVM for cross-compilation
      run: |
        rustup target add ${{ matrix.target }} || true
        brew install llvm

    - name: Set LLVM paths for cross-compiler
      id: set_llvm_paths
      run: echo "LLVM_PATH=$(brew --prefix llvm)" >> $GITHUB_OUTPUT

    - name: Configure cross-compiler for Linux on macOS
      env:
        LLVM_PATH: ${{ steps.set_llvm_paths.outputs.LLVM_PATH }}
      run: |
        echo "CC_${{ matrix.target }}=${LLVM_PATH}/bin/clang" >> $GITHUB_ENV
        echo "CXX_${{ matrix.target }}=${LLVM_PATH}/bin/clang++" >> $GITHUB_ENV
        echo "AR_${{ matrix.target }}=${LLVM_PATH}/bin/llvm-ar" >> $GITHUB_ENV
        echo "LD_${{ matrix.target }}=${LLVM_PATH}/bin/lld" >> $GITHUB_ENV

    - name: Build/Test ${{ matrix.target }}
      run: |
        if [[ "${{ matrix.feature }}" == "default" ]]; then
          cargo build --verbose --target ${{ matrix.target }} && cargo test --target ${{ matrix.target }}
        else
          cargo build --features ${{ matrix.feature }} --verbose --target ${{ matrix.target }} && cargo test --features ${{ matrix.feature }} --target ${{ matrix.target }}
        fi
      continue-on-error: true
