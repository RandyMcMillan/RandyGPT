name: linux-matrix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "ma*" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ["default", "model-xs", "model-s", "model-ds", "model-m", "model-deep", "model-xl", "model-l"]

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies for BLAS
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev build-essential
    - name: Build ${{ matrix.feature }}
      run: cargo build --verbose
    - name: Test ${{ matrix.feature }}
      run: |
        if [[ "${{ matrix.feature }}" == "default" ]]; then
          cargo test --verbose
        else
          cargo test --verbose -- --${{ matrix.feature }}
        fi
      #continue-on-error: true
